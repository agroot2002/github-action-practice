# Expected behaiviour : we have set continue-on-error as true this will continue even if a step in job fails , fail-fast is set to false to stop other jobs from cancel 

name: 'Matrix Intro'
on : [push]
jobs : 
    Running-Consecutive-Jobs :
        continue-on-error : true
        strategy :
            matrix :
                os : [ubuntu-latest , windows-latest]
                node-v : [16,17,18]
                include :
                    - os : macos-latest
                      node-v : 19
                      experimental : true
                exclude :
                    - os : ubuntu-latest
            fail-fast : false

        runs-on : ${{matrix.os}}
        steps :
            - name : 'Node version before '
              run : node -v

            - name : 'Changing Node version'
              uses : actions/setup-node@v3
              with :
                  node-version : ${{matrix.node-v}}

            - name : 'Node version after '
              run : node -v

            - name : 'Matrix log'
              run : echo '${{ toJson(matrix) }}'

            - name : 'Fail if experimental'
              if : ${{ matrix.experimental }}
              run : exit 1